<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background gradient: soft cream -->
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F2E2D8"/>
      <stop offset="100%" stop-color="#E4CFC4"/>
    </radialGradient>

    <!-- Back petal gradient: deeper coral, slightly muted -->
    <radialGradient id="pb" cx="50" cy="50" r="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#AA4A38"/>
      <stop offset="40%"  stop-color="#C4614A"/>
      <stop offset="75%"  stop-color="#D4795C"/>
      <stop offset="100%" stop-color="#E09070"/>
    </radialGradient>

    <!-- Front petal gradient: warm peach-coral -->
    <radialGradient id="pf" cx="50" cy="50" r="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C4614A"/>
      <stop offset="35%"  stop-color="#D4735A"/>
      <stop offset="70%"  stop-color="#E8956D"/>
      <stop offset="100%" stop-color="#F5B89A"/>
    </radialGradient>

    <!-- Center warm glow -->
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF7A3D" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#D4735A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C4614A" stop-opacity="0"/>
    </radialGradient>

    <!-- Directional highlight: light from upper-left -->
    <radialGradient id="hl" cx="32" cy="28" r="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FDDECB" stop-opacity="0.60"/>
      <stop offset="55%"  stop-color="#FDDECB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FDDECB" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Back layer — 4 petals at 45° offsets (behind front petals) -->
  <g fill="url(#pb)" opacity="0.88">
    <path d="M50,50 C36,46 34,19 50,7 C66,19 64,46 50,50" transform="rotate(45,50,50)"/>
    <path d="M50,50 C36,46 34,19 50,7 C66,19 64,46 50,50" transform="rotate(135,50,50)"/>
    <path d="M50,50 C36,46 34,19 50,7 C66,19 64,46 50,50" transform="rotate(225,50,50)"/>
    <path d="M50,50 C36,46 34,19 50,7 C66,19 64,46 50,50" transform="rotate(315,50,50)"/>
  </g>

  <!-- Front layer — 4 petals at cardinal angles -->
  <g fill="url(#pf)">
    <path d="M50,50 C36,46 34,19 50,7 C66,19 64,46 50,50"/>
    <path d="M50,50 C36,46 34,19 50,7 C66,19 64,46 50,50" transform="rotate(90,50,50)"/>
    <path d="M50,50 C36,46 34,19 50,7 C66,19 64,46 50,50" transform="rotate(180,50,50)"/>
    <path d="M50,50 C36,46 34,19 50,7 C66,19 64,46 50,50" transform="rotate(270,50,50)"/>
  </g>

  <!-- Center warm glow -->
  <circle cx="50" cy="50" r="14" fill="url(#cg)"/>

  <!-- Upper-left highlight for sculptural 3D depth -->
  <circle cx="50" cy="50" r="50" fill="url(#hl)"/>
</svg>
